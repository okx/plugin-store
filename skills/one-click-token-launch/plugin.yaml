schema_version: 1
name: one-click-token-launch
version: "1.0.0"
description: "One-click multi-launchpad token creation with bundled buy, IPFS metadata, MEV protection across 6 launchpads on Solana and BSC"
author:
  name: "victorlee"
  github: "VibeCodeDaddy69"
license: MIT
category: trading-strategy
tags:
  - solana
  - bsc
  - onchainos
  - one-click-token-launch
  - meme-coin

components:
  skill:
    dir: "."

api_calls:
  # Launchpad APIs
  - https://pumpportal.fun          # PumpPortal trade-local API (pump.fun + LetsBonk)
  - https://pump.fun                # pump.fun IPFS upload (free, no key)
  - https://bags.fm                 # Bags.fm token launch REST API
  - https://moon.it                 # Moonit prepare-mint / submit-mint API
  # MEV protection
  - https://mainnet.block-engine.jito.wtf  # Jito bundle submission
  # IPFS / metadata
  - https://api.pinata.cloud        # Pinata IPFS upload (fallback, requires JWT)
  - https://gateway.pinata.cloud    # Pinata IPFS gateway (read)
  # Block explorers (read-only, for explorer links)
  - https://solscan.io
  - https://bscscan.com
type: community-developer
